async function renderExplorerLiveStream() {
  const el = document.getElementById('explorerLiveStream');
  if (!el) return;
  const b = bridgeData.get(selectedBridge);
  if (!b) { el.innerHTML = ''; return; }

  try {
    const r = await fetch(b._url + '/mempool', { signal: AbortSignal.timeout(8000) });
    const data = await r.json();
    const txs = data.transactions || [];
    if (txs.length === 0) {
      el.innerHTML = '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px">No transactions in mempool right now</div>';
      return;
    }
    let html = '<div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Live transactions</div>';
    const show = txs.slice(0, 20);
    for (const tx of show) {
      const badges = (tx.outputs || []).filter(o => o.type !== 'p2pkh' && o.type !== 'p2sh').map(o => protocolBadge(o.type, o.protocol)).join(' ');
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;margin-bottom:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;cursor:pointer" onclick="document.getElementById(\'txLookupInput\').value=\'' + tx.txid + '\';explorerSearch()">';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<span style="font-family:var(--mono);font-size:11px;color:var(--accent-blue)">' + tx.txid.slice(0, 12) + '...' + tx.txid.slice(-6) + '</span>';
      if (badges) html += badges;
      html += '</div>';
      html += '<span style="font-size:11px;color:var(--text-dim)">' + (tx.size || 0) + 'B</span>';
      html += '</div>';
    }
    if (txs.length > 20) html += '<div style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:4px">+ ' + (txs.length - 20) + ' more in mempool</div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '';
  }
}

function detectSearchType(input) {
  if (!input) return null;
  if (/^[0-9a-fA-F]{64}$/.test(input)) return 'txid';
  if (/^[13][a-km-zA-HJ-NP-Z1-9]{24,33}$/.test(input)) return 'address';
  return null;
}

function explorerSearch() {
  const input = document.getElementById('txLookupInput');
  const val = input ? input.value.trim() : '';
  const el = document.getElementById('txLookupResult');
  if (!el) return;
  const type = detectSearchType(val);
  if (type === 'txid') {
    const b = bridgeData.get(selectedBridge);
    if (b) lookupTx(b._url);
    return;
  }
  if (type === 'address') {
    savedExplorerInput = val;
    lookupAddress(val);
    return;
  }
  el.innerHTML = '<div style="color:var(--accent-red);font-size:12px;margin-top:12px">Enter a valid txid or BSV address</div>';
}

async function lookupAddress(address) {
  const el = document.getElementById('txLookupResult');
  if (!el) return;
  const b = bridgeData.get(selectedBridge);
  if (!b) { el.innerHTML = '<div style="color:var(--accent-red);font-size:12px;margin-top:12px">Select a bridge first</div>'; return; }

  el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;margin-top:12px">Loading address history...</div>';

  let historyHtml = '';
  let inscHtml = '';

  // Fetch tx history and inscriptions in parallel
  try {
    const [histRes, inscRes] = await Promise.all([
      fetch(b._url + '/address/' + address + '/history', { signal: AbortSignal.timeout(15000) }).then(r => r.ok ? r.json() : { history: [] }).catch(() => ({ history: [] })),
      fetch(b._url + '/inscriptions?address=' + encodeURIComponent(address) + '&limit=50', { signal: AbortSignal.timeout(10000) }).then(r => r.ok ? r.json() : { inscriptions: [], total: 0 }).catch(() => ({ inscriptions: [], total: 0 }))
    ]);

    // Transaction history section
    const txs = histRes.history || [];
    historyHtml = '<div class="glass" style="padding:16px;margin-top:12px">';
    historyHtml += '<div style="font-size:13px;color:var(--text-primary);font-weight:600;margin-bottom:10px">Transaction History</div>';
    if (txs.length === 0) {
      historyHtml += '<div style="color:var(--text-dim);font-size:12px">No transactions found for this address</div>';
    } else {
      historyHtml += '<div style="color:var(--text-muted);font-size:11px;margin-bottom:8px">' + txs.length + ' transaction' + (txs.length !== 1 ? 's' : '') + '</div>';
      const show = txs.slice(0, 50);
      for (const tx of show) {
        historyHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">';
        historyHtml += '<span class="addr-tx-link" style="font-family:var(--mono);font-size:11px;color:var(--accent-blue);cursor:pointer" onclick="document.getElementById(\'txLookupInput\').value=\'' + tx.tx_hash + '\';explorerSearch()">' + tx.tx_hash.slice(0, 12) + '...' + tx.tx_hash.slice(-8) + '</span>';
        historyHtml += '<span style="font-size:11px;color:var(--text-dim)">' + (tx.height > 0 ? 'block ' + tx.height.toLocaleString() : '<span style="color:var(--accent-yellow)">unconfirmed</span>') + '</span>';
        historyHtml += '</div>';
      }
      if (txs.length > 50) historyHtml += '<div style="color:var(--text-dim);font-size:11px;margin-top:6px">... and ' + (txs.length - 50) + ' more</div>';
    }
    historyHtml += '</div>';

    // Inscriptions section
    const inscs = inscRes.inscriptions || [];
    inscHtml = '<div class="glass" style="padding:16px;margin-top:12px">';
    inscHtml += '<div style="font-size:13px;color:var(--text-primary);font-weight:600;margin-bottom:10px">Inscriptions</div>';
    if (inscs.length === 0) {
      inscHtml += '<div style="color:var(--text-dim);font-size:12px;margin-bottom:8px">No inscriptions indexed for this address</div>';
      inscHtml += '<button class="btn sm" style="background:rgba(88,166,255,0.15);color:var(--accent-blue);border:1px solid rgba(88,166,255,0.3)" onclick="startAddressScan(\'' + escapeHtml(address) + '\')">Scan for inscriptions</button>';
    } else {
      inscHtml += '<div style="color:var(--text-muted);font-size:11px;margin-bottom:8px">' + inscs.length + ' inscription' + (inscs.length !== 1 ? 's' : '') + '</div>';
      inscHtml += '<div class="inscription-grid">';
      for (const insc of inscs) {
        inscHtml += '<div class="inscription-card glass">';
        const src = '/inscription/' + insc.txid + '/' + insc.vout + '/content';
        const ct = insc.contentType || '';
        if (ct.startsWith('image/')) {
          inscHtml += '<img class="insc-thumb" src="' + src + '" alt="inscription" loading="lazy" onclick="window.open(\'' + src + '\',\'_blank\')">';
        } else if (ct === 'text/plain' || ct === 'application/json' || ct === 'application/bsv-20') {
          inscHtml += '<div class="insc-text" data-src="' + src + '">Loading...</div>';
        }
        inscHtml += '<div class="insc-txid" style="cursor:pointer;color:var(--accent-blue)" onclick="document.getElementById(\'txLookupInput\').value=\'' + insc.txid + '\';explorerSearch()">' + insc.txid.slice(0, 16) + '...:' + insc.vout + '</div>';
        inscHtml += '<div class="insc-meta">';
        inscHtml += protocolBadge('ordinal', insc.isBsv20 ? 'bsv-20' : 'ordinal');
        if (insc.contentType) inscHtml += '<span>' + escapeHtml(insc.contentType) + '</span>';
        if (insc.contentSize) inscHtml += '<span>' + insc.contentSize + ' bytes</span>';
        inscHtml += '</div>';
        inscHtml += '</div>';
      }
      inscHtml += '</div>';
    }
    inscHtml += '</div>';
  } catch (e) {
    historyHtml = '<div style="color:var(--accent-red);font-size:12px;margin-top:12px">' + escapeHtml(e.message) + '</div>';
  }

  const headerHtml = '<div style="font-size:12px;color:var(--text-muted);margin-top:12px;margin-bottom:4px">Address: <span style="font-family:var(--mono);color:var(--text-secondary)">' + escapeHtml(address) + '</span></div>';
  el.innerHTML = headerHtml + historyHtml + inscHtml;
  savedExplorerResult = el.innerHTML;

  // Lazy-load text content in inscription cards
  el.querySelectorAll('.insc-text[data-src]').forEach(div => {
    fetch(div.dataset.src).then(r => r.text()).then(t => {
      try { t = JSON.stringify(JSON.parse(t), null, 2); } catch {}
      div.textContent = t;
    }).catch(() => { div.textContent = '[failed to load]'; });
  });
}

function startAddressScan(address) {
  const b = bridgeData.get(selectedBridge);
  if (!b) return;
  const el = document.getElementById('txLookupResult');
  if (!el) return;
  const scanDiv = document.createElement('div');
  scanDiv.id = 'explorerScanProgress';
  scanDiv.className = 'glass';
  scanDiv.style.cssText = 'padding:12px;margin-top:12px';
  scanDiv.innerHTML = '<div style="color:var(--text-secondary);font-size:13px">Scanning <span style="font-family:var(--mono);color:var(--accent-blue)">' + escapeHtml(address) + '</span>...</div><div style="margin-top:8px;height:4px;background:var(--bg-input);border-radius:2px;overflow:hidden"><div id="explorerScanBar" style="width:0%;height:100%;background:var(--accent-blue);transition:width 0.3s"></div></div><div id="explorerScanStatus" style="font-size:11px;color:var(--text-muted);margin-top:6px"></div>';
  el.appendChild(scanDiv);

  fetch(b._url + '/scan-address', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ address }) })
  .then(res => {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    function pump() {
      return reader.read().then(({ done, value }) => {
        if (done) return;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const ev = JSON.parse(line.slice(6));
            const bar = document.getElementById('explorerScanBar');
            const status = document.getElementById('explorerScanStatus');
            if (ev.phase === 'scanning' && ev.total > 0) {
              const pct = Math.round((ev.current / ev.total) * 100);
              if (bar) bar.style.width = pct + '%';
              if (status) status.textContent = ev.current + '/' + ev.total + (ev.found > 0 ? ' — found ' + ev.found + ' inscription(s)' : '');
            } else if (ev.phase === 'done' || ev.phase === 'complete') {
              if (bar) { bar.style.width = '100%'; bar.style.background = 'var(--accent-green)'; }
              if (status) status.textContent = ev.result ? ev.result.inscriptionsFound + ' inscriptions found' : 'Scan complete';
              setTimeout(() => lookupAddress(address), 1000);
            } else if (ev.phase === 'error') {
              if (bar) bar.style.background = 'var(--accent-red)';
              if (status) status.textContent = 'Error: ' + (ev.error || 'unknown');
            }
          } catch {}
        }
        return pump();
      });
    }
    return pump();
  })
  .catch(e => { scanDiv.innerHTML = '<div style="color:var(--accent-red)">Scan failed: ' + escapeHtml(e.message) + '</div>'; });
}

function restoreExplorer() {
  const inp = document.getElementById('txLookupInput');
  const res = document.getElementById('txLookupResult');
  if (inp && savedExplorerInput) inp.value = savedExplorerInput;
  if (res && savedExplorerResult) res.innerHTML = savedExplorerResult;
}

async function lookupTx(bridgeUrl) {
  const input = document.getElementById('txLookupInput');
  const txid = input ? input.value.trim() : '';
  const el = document.getElementById('txLookupResult');
  if (!el) return;
  if (!txid || txid.length !== 64 || !/^[0-9a-fA-F]+$/.test(txid)) {
    el.innerHTML = '<div style="color:var(--accent-red);font-size:12px;margin-top:12px">Enter a valid 64-character hex txid</div>';
    return;
  }
  el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;margin-top:12px">Fetching from bridge...</div>';
  savedExplorerInput = txid;
  try {
    const [txRes, statusRes, proofRes] = await Promise.all([
      fetch(bridgeUrl + '/tx/' + txid, { signal: AbortSignal.timeout(15000) }),
      fetch(bridgeUrl + '/tx/' + txid + '/status', { signal: AbortSignal.timeout(5000) }).catch(() => null),
      fetch(bridgeUrl + '/proof/' + txid, { signal: AbortSignal.timeout(5000) }).catch(() => null)
    ]);
    const data = await txRes.json();
    if (data.error) {
      el.innerHTML = '<div style="color:var(--accent-red);font-size:12px;margin-top:12px">' + escapeHtml(data.error) + '</div>';
      savedExplorerResult = el.innerHTML;
      return;
    }
    const txStatus = statusRes && statusRes.ok ? await statusRes.json() : null;
    const txProof = proofRes && proofRes.ok ? await proofRes.json() : null;
    el.innerHTML = renderTxDetail(data, txStatus, txProof);
    savedExplorerResult = el.innerHTML;
  } catch (e) {
    el.innerHTML = '<div style="color:var(--accent-red);font-size:12px;margin-top:12px">' + escapeHtml(e.message) + '</div>';
    savedExplorerResult = el.innerHTML;
  }
}

function renderTxDetail(tx, txStatus, txProof) {
  let html = '<div class="glass" style="padding:16px;margin-top:12px">';
  const src = (tx.source || '').toLowerCase();
  const isLocal = src === 'local' || src === 'p2p' || src === 'mempool' || src === 'store';
  const srcDot = isLocal ? 'green' : 'blue';
  const srcLabel = src === 'woc' ? 'Fetched from WhatsOnChain' : src === 'store' ? 'From your bridge\'s index' : isLocal ? 'Fetched from BSV network' : 'Source: ' + escapeHtml(tx.source || '?');
  const b = bridgeData.get(selectedBridge);
  const peerCount = b ? b.peers.connected : 0;
  html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">';
  html += '<span class="status-dot ' + srcDot + '" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle"></span>';
  html += '<span style="color:var(--text-secondary)">' + srcLabel + '</span>';
  html += ' &middot; ' + (tx.size || 0) + ' bytes';
  html += ' &middot; ' + (tx.inputs ? tx.inputs.length : 0) + ' in';
  html += ' &middot; ' + (tx.outputs ? tx.outputs.length : 0) + ' out';
  html += '</div>';
  html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:12px">Your bridge is connected to <strong style="color:var(--text-muted)">' + peerCount + ' peers</strong> on the BSV network</div>';

  // Confirmation status
  if (txStatus) {
    const state = txStatus.state || 'unknown';
    const stateColors = { mempool: 'yellow', confirmed: 'green', orphaned: 'red', dropped: 'red' };
    const stateColor = stateColors[state] || '';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm)">';
    html += '<span class="status-dot ' + stateColor + '" style="display:inline-block;width:8px;height:8px;border-radius:50%"></span>';
    html += '<span style="font-size:12px;color:var(--text-secondary);font-weight:500;text-transform:capitalize">' + escapeHtml(state) + '</span>';
    if (txStatus.height) html += '<span style="font-size:11px;color:var(--text-muted)">&middot; Block ' + txStatus.height.toLocaleString() + '</span>';
    if (txStatus.blockHash) html += '<span style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">' + txStatus.blockHash.slice(0, 16) + '...</span>';
    if (txStatus.firstSeen) html += '<span style="font-size:10px;color:var(--text-dim);margin-left:auto">first seen ' + new Date(txStatus.firstSeen).toLocaleString() + '</span>';
    html += '</div>';
  }

  // Merkle proof
  if (txProof && txProof.proof) {
    html += '<div style="padding:10px 14px;margin-bottom:12px;background:rgba(63,185,80,0.06);border:1px solid rgba(63,185,80,0.15);border-radius:var(--radius-sm)">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">';
    html += '<span style="color:var(--accent-green);font-size:12px;font-weight:600">Merkle Proof Verified</span>';
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--text-muted)">';
    html += 'Block: <span style="color:var(--text-secondary);font-family:var(--mono)">' + (txProof.height ? txProof.height.toLocaleString() : '-') + '</span>';
    html += ' &middot; Index: <span style="color:var(--text-secondary)">' + (txProof.proof.index !== undefined ? txProof.proof.index : '-') + '</span>';
    html += ' &middot; Path: <span style="color:var(--text-secondary)">' + (txProof.proof.nodes ? txProof.proof.nodes.length : 0) + ' nodes</span>';
    html += '</div>';
    if (txProof.blockHash) html += '<div style="font-size:10px;color:var(--text-dim);font-family:var(--mono);margin-top:4px">' + txProof.blockHash + '</div>';
    html += '</div>';
  }

  let decodedCallout = false;
  if (tx.outputs) {
    for (const o of tx.outputs) {
      html += '<div class="tx-detail-output">';
      html += '<div class="tx-detail-row">';
      html += '<span>' + protocolBadge(o.type, o.protocol) + ' <span style="color:var(--text-muted);font-size:11px">#' + o.vout + '</span></span>';
      html += '<span style="font-family:var(--mono);font-size:12px;color:var(--text-secondary)">' + fmtSats(o.satoshis) + ' sats</span>';
      html += '</div>';
      if (o.hash160) html += '<div style="font-size:10px;color:var(--text-dim);font-family:var(--mono);margin-top:3px">hash160: ' + o.hash160 + '</div>';
      if (o.parsed) {
        html += renderParsedData(o.type, o.protocol, o.parsed, tx.txid, o.vout);
        if (!decodedCallout) { html += '<div style="font-size:13px;color:var(--text-muted);margin-top:6px;font-style:italic">Decoded by your bridge \u2014 block explorers show this as raw hex</div>'; decodedCallout = true; }
      }
      else if (o.type === 'op_return' && o.data && o.data.length > 0) {
        html += renderRawOpReturn(o.data);
        if (!decodedCallout) { html += '<div style="font-size:13px;color:var(--text-muted);margin-top:6px;font-style:italic">Decoded by your bridge \u2014 block explorers show this as raw hex</div>'; decodedCallout = true; }
      }
      html += '</div>';
    }
  }
  html += '</div>';
  return html;
}

// ── Parsed data rendering ──────────────────────────
function renderRawOpReturn(pushes) {
  let html = '<div class="tx-parsed-data">';
  html += '<div style="color:var(--text-dim);font-size:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Push Data</div>';
  for (let i = 0; i < pushes.length && i < 20; i++) {
    const hex = pushes[i];
    if (!hex) { html += '<span style="color:var(--text-dim)">#' + i + ': [empty]</span><br>'; continue; }
    const ascii = tryDecodeAscii(hex);
    if (ascii) {
      html += '#' + i + ': <span class="val">"' + escapeHtml(ascii) + '"</span><br>';
    } else {
      const display = hex.length > 40 ? hex.slice(0, 40) + '...' : hex;
      html += '#' + i + ': <span style="color:var(--text-dim);font-family:var(--mono)">' + display + '</span> <span style="color:var(--text-dim)">(' + (hex.length / 2) + 'B)</span><br>';
    }
  }
  if (pushes.length > 20) html += '<span style="color:var(--text-dim)">... ' + (pushes.length - 20) + ' more pushes</span>';
  html += '</div>';
  return html;
}

function renderParsedData(type, protocol, parsed, txid, vout) {
  if (!parsed) return '';
  let html = '<div class="tx-parsed-data">';

  if (protocol === 'b') {
    html += 'Mime: <span class="val">' + escapeHtml(parsed.mimeType || '-') + '</span>';
    if (parsed.filename) html += ' &middot; File: <span class="val">' + escapeHtml(parsed.filename) + '</span>';
    if (parsed.encoding) html += ' &middot; Enc: ' + escapeHtml(parsed.encoding);
  } else if (protocol === 'bcat') {
    html += 'Mime: <span class="val">' + escapeHtml(parsed.mimeType || '-') + '</span>';
    if (parsed.filename) html += ' &middot; File: <span class="val">' + escapeHtml(parsed.filename) + '</span>';
    html += ' &middot; Chunks: <span class="val">' + (parsed.chunkTxids ? parsed.chunkTxids.length : 0) + '</span>';
  } else if (protocol === 'bcat-part') {
    html += 'Chunk data: <span class="val">' + (parsed.data ? (parsed.data.length / 2) + ' bytes' : '-') + '</span>';
  } else if (protocol === 'map') {
    html += 'Action: <span class="val">' + escapeHtml(parsed.action || '-') + '</span>';
    if (parsed.pairs) {
      for (const [k, v] of Object.entries(parsed.pairs)) {
        html += '<br>' + escapeHtml(k) + ': <span class="val">' + escapeHtml(v) + '</span>';
      }
    }
  } else if (protocol === 'metanet') {
    html += 'Node: <span class="val">' + escapeHtml(parsed.nodeAddress || '-') + '</span>';
    if (parsed.parentTxid) html += '<br>Parent: <span class="val" style="font-size:10px">' + parsed.parentTxid + '</span>';
  } else if (protocol === 'bsv-20') {
    if (parsed.bsv20) {
      html += 'Op: <span class="accent">' + escapeHtml(parsed.bsv20.op || '-') + '</span>';
      if (parsed.bsv20.tick) html += ' &middot; Tick: <span class="val">' + escapeHtml(parsed.bsv20.tick) + '</span>';
      if (parsed.bsv20.id) html += ' &middot; ID: <span class="val" style="font-size:10px">' + parsed.bsv20.id.slice(0, 16) + '...</span>';
      if (parsed.bsv20.amt) html += ' &middot; Amt: <span class="val">' + escapeHtml(parsed.bsv20.amt) + '</span>';
    } else {
      html += 'Type: <span class="val">' + escapeHtml(parsed.contentType || '-') + '</span>';
    }
  } else if (protocol === 'ordinal') {
    html += 'Type: <span class="val">' + escapeHtml(parsed.contentType || '-') + '</span>';
    if (parsed.content) html += ' &middot; Size: <span class="val">' + (parsed.content.length / 2) + ' bytes</span>';
    if (parsed.content && parsed.contentType && parsed.contentType.startsWith('image/')) {
      const b64 = hexToBase64(parsed.content);
      html += '</div><div style="margin-top:8px"><img src="data:' + escapeHtml(parsed.contentType) + ';base64,' + b64 + '" style="max-width:100%;max-height:320px;border-radius:var(--radius-sm);border:1px solid var(--border)" alt="inscription">';
    }
  } else if (type === 'p2sh') {
    html += 'Script hash: <span class="val" style="font-family:var(--mono)">' + (parsed.scriptHash || '-') + '</span>';
  } else if (type === 'multisig') {
    html += '<span class="val">' + parsed.m + '-of-' + parsed.n + ' multisig</span>';
  } else {
    const s = JSON.stringify(parsed);
    html += '<span class="val">' + escapeHtml(s.length > 120 ? s.slice(0, 120) + '...' : s) + '</span>';
  }

  html += '</div>';
  return html;
}


// ── 3D Mesh Map ───────────────────────────────────
let mesh3d = null; // { renderer, scene, camera, controls, animId, nodes, lines, particles, labels, container, lastInteraction }

function hasWebGL() {
  try { const c = document.createElement('canvas'); return !!(window.WebGLRenderingContext && (c.getContext('webgl') || c.getContext('experimental-webgl'))); } catch { return false; }
}

function initMeshMap3D(containerId) {
  if (mesh3d) destroyMeshMap3D();
  const container = document.getElementById(containerId);
  if (!container || !hasWebGL() || typeof THREE === 'undefined') return false;

  const w = container.clientWidth, h = container.clientHeight;

  // ── Build topology from ALL bridges ──────────────
  const allBridges = [...bridgeData.values()].filter(b => !b._error);
  const n = allBridges.length;
  if (n === 0) return false;

  // Map pubkey → bridge name for cross-referencing
  const pubkeyToName = new Map();
  for (const b of allBridges) {
    if (b.bridge && b.bridge.pubkeyHex) pubkeyToName.set(b.bridge.pubkeyHex, b._name);
  }

  // Build edge list: pairs of bridge indices that are connected
  const edges = [];
  const edgeSet = new Set();
  for (let i = 0; i < n; i++) {
    const b = allBridges[i];
    if (!b.peers || !b.peers.list) continue;
    for (const p of b.peers.list) {
      if (!p.connected) continue;
      const peerName = pubkeyToName.get(p.pubkeyHex);
      if (!peerName) continue;
      const j = allBridges.findIndex(bb => bb._name === peerName);
      if (j < 0 || j === i) continue;
      const key = Math.min(i, j) + ':' + Math.max(i, j);
      if (edgeSet.has(key)) continue;
      edgeSet.add(key);
      // Get score data from the peer entry
      const score = p.score !== undefined ? p.score : 0.5;
      const breakdown = p.scoreBreakdown || null;
      edges.push({ a: i, b: j, score, breakdown });
    }
  }

  // ── Scene setup ──────────────────────────────────
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 200);
  // Scale camera distance based on node count
  const camDist = Math.max(14, n * 2.5);
  camera.position.set(0, camDist * 0.4, camDist);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.minDistance = 5;
  controls.maxDistance = camDist * 2;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  // ── Lights ───────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x334466, 0.8));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0x58a6ff, 0.3);
  rimLight.position.set(-3, -5, -3);
  scene.add(rimLight);

  // ── Starfield ────────────────────────────────────
  const starGeo = new THREE.BufferGeometry();
  const starPositions = new Float32Array(400 * 3);
  for (let i = 0; i < 400; i++) {
    starPositions[i * 3] = (Math.random() - 0.5) * 120;
    starPositions[i * 3 + 1] = (Math.random() - 0.5) * 120;
    starPositions[i * 3 + 2] = (Math.random() - 0.5) * 120;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.35 })));

  // ── Node positions — even distribution in 3D ─────
  const orbitRadius = Math.max(5, n * 1.2);
  const nodePositions = [];
  for (let i = 0; i < n; i++) {
    if (n === 1) {
      nodePositions.push(new THREE.Vector3(0, 0, 0));
    } else if (n === 2) {
      nodePositions.push(new THREE.Vector3(i === 0 ? -3 : 3, 0, 0));
    } else {
      // Distribute on a circle (flatten Y) for small counts, Fibonacci sphere for large
      const phi = Math.acos(1 - 2 * (i + 0.5) / n);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      const x = orbitRadius * Math.sin(phi) * Math.cos(theta);
      const y = orbitRadius * Math.cos(phi) * 0.35;
      const z = orbitRadius * Math.sin(phi) * Math.sin(theta);
      nodePositions.push(new THREE.Vector3(x, y, z));
    }
  }

  // ── Create bridge nodes ──────────────────────────
  const nodes = [];
  const labelEls = [];
  const glowRings = [];

  for (let i = 0; i < n; i++) {
    const b = allBridges[i];
    const isSelected = b._name === selectedBridge;
    const isOnline = !b._error;
    const peerCount = b.peers ? b.peers.connected : 0;

    // All bridges same size — color based on health only
    const radius = 0.65;
    const nodeGeo = new THREE.SphereGeometry(radius, 32, 32);

    let color, emissive, emissiveIntensity;
    if (isOnline && peerCount > 0) {
      color = 0x3fb950; emissive = 0x2a5a2a; emissiveIntensity = 0.7;
    } else if (isOnline) {
      color = 0xd29922; emissive = 0x4a3a10; emissiveIntensity = 0.5;
    } else {
      color = 0xf85149; emissive = 0x5a2020; emissiveIntensity = 0.5;
    }

    const nodeMat = new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity, roughness: 0.2, metalness: 0.6 });
    const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
    nodeMesh.position.copy(nodePositions[i]);
    scene.add(nodeMesh);

    // Point light per node — same for all
    const lightColor = isOnline ? 0x3fb950 : 0xf85149;
    const pointLight = new THREE.PointLight(lightColor, 0.8, 6);
    nodeMesh.add(pointLight);

    // Subtle selection ring — thin white ring if this is the sidebar-selected bridge
    if (isSelected) {
      const selRing = new THREE.Mesh(
        new THREE.RingGeometry(0.85, 0.95, 48),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
      );
      selRing.rotation.x = -Math.PI / 2;
      selRing.position.copy(nodePositions[i]);
      scene.add(selRing);
      glowRings.push(selRing);
    }

    nodes.push({ mesh: nodeMesh, bridge: b, isSelected });

    // HTML label — bridge name, all same style (online/offline only)
    const label = document.createElement('div');
    label.className = 'mesh3d-label ' + (isOnline ? 'online' : 'offline');
    label.textContent = b._name;
    container.appendChild(label);
    labelEls.push({ el: label, nodeMesh });
  }

  // ── Create edges between connected bridges ───────
  const edgeObjs = [];
  const particles = [];

  for (const edge of edges) {
    const posA = nodePositions[edge.a];
    const posB = nodePositions[edge.b];

    // Bezier midpoint — arc upward for visual clarity
    const mid = new THREE.Vector3(
      (posA.x + posB.x) * 0.5,
      (posA.y + posB.y) * 0.5 + orbitRadius * 0.2,
      (posA.z + posB.z) * 0.5
    );
    const curve = new THREE.QuadraticBezierCurve3(posA.clone(), mid, posB.clone());
    const tubeGeo = new THREE.TubeGeometry(curve, 48, 0.03, 8, false);
    const tubeMat = new THREE.MeshBasicMaterial({ color: 0x58a6ff, transparent: true, opacity: 0.45 });
    const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
    scene.add(tubeMesh);
    edgeObjs.push({ mesh: tubeMesh, curve, edge });

    // Traffic particles — count driven by mempool activity, speed by latency
    // Get mempool sizes for the two bridges on this edge
    const bridgeA = allBridges[edge.a];
    const bridgeB = allBridges[edge.b];
    const mempoolA = bridgeA.txs ? bridgeA.txs.mempool : 0;
    const mempoolB = bridgeB.txs ? bridgeB.txs.mempool : 0;
    const traffic = Math.max(mempoolA, mempoolB);
    // 1 idle particle (keepalive pulse) + 1 per 5 mempool txs, max 8
    const pCount = Math.min(8, 1 + Math.floor(traffic / 5));
    // Speed: slow idle crawl when quiet, faster with more RTT score (inverted — high score = low latency = faster)
    const rtt = (edge.breakdown && edge.breakdown.responseTime) ? edge.breakdown.responseTime : 0.5;
    const baseSpeed = traffic > 0 ? 0.0015 : 0.0006; // idle crawl vs active
    const speed = baseSpeed + rtt * 0.002;
    for (let j = 0; j < pCount; j++) {
      const pGeo = new THREE.SphereGeometry(0.07, 8, 8);
      // Idle particles are dimmer, active ones brighter
      const brightness = traffic > 0 ? 0x7ec8ff : 0x4a7a9a;
      const pMat = new THREE.MeshBasicMaterial({ color: brightness, transparent: true, opacity: traffic > 0 ? 0.9 : 0.4 });
      const pMesh = new THREE.Mesh(pGeo, pMat);
      scene.add(pMesh);
      particles.push({ mesh: pMesh, curve, t: j / pCount, speed, direction: j % 2 === 0 ? 1 : -1, isIdle: traffic === 0 });
    }
  }

  // ── Auto-rotate pause ────────────────────────────
  let lastInteraction = 0;
  const onInteract = () => { lastInteraction = Date.now(); controls.autoRotate = false; };
  renderer.domElement.addEventListener('pointerdown', onInteract);
  renderer.domElement.addEventListener('wheel', onInteract);

  // ── Animation loop ───────────────────────────────
  const clock = new THREE.Clock();
  let animId;

  function animate() {
    animId = requestAnimationFrame(animate);
    clock.getDelta();
    const t = clock.getElapsedTime();

    if (!controls.autoRotate && Date.now() - lastInteraction > 10000) controls.autoRotate = true;
    controls.update();

    // Edge pulsing
    for (let i = 0; i < edgeObjs.length; i++) {
      edgeObjs[i].mesh.material.opacity = 0.3 + 0.2 * Math.sin(t * 2 + i * 1.3);
    }

    // Glow ring animation on selected bridge
    for (let i = 0; i < glowRings.length; i++) {
      const gr = glowRings[i];
      gr.material.opacity = (i % 2 === 0 ? 0.15 : 0.05) + (i % 2 === 0 ? 0.12 : 0.05) * Math.sin(t * 1.5 + i);
      gr.rotation.z = t * (i % 2 === 0 ? 0.1 : -0.08);
    }

    // Particles along edges — idle ones crawl & fade, active ones zip
    for (const p of particles) {
      p.t += p.speed * p.direction;
      if (p.t > 1) p.t -= 1;
      if (p.t < 0) p.t += 1;
      const pos = p.curve.getPointAt(Math.max(0, Math.min(1, p.t)));
      p.mesh.position.copy(pos);
      if (p.isIdle) {
        // Slow breathing pulse — barely visible keepalive
        p.mesh.material.opacity = 0.15 + 0.2 * Math.sin(p.t * Math.PI);
      } else {
        p.mesh.material.opacity = 0.4 + 0.5 * Math.sin(p.t * Math.PI);
      }
    }

    // Project labels 3D → 2D
    const rect = renderer.domElement.getBoundingClientRect();
    for (const lb of labelEls) {
      const pos = lb.nodeMesh.position.clone();
      pos.y += (lb.el.classList.contains('center') ? 1.6 : 1.2);
      pos.project(camera);
      const sx = (pos.x * 0.5 + 0.5) * rect.width;
      const sy = (-pos.y * 0.5 + 0.5) * rect.height;
      lb.el.style.left = sx + 'px';
      lb.el.style.top = sy + 'px';
      lb.el.style.display = pos.z > 1 ? 'none' : '';
    }

    renderer.render(scene, camera);
  }
  animate();

  // Resize — reads from mesh3d.container so it works after expand/collapse swap
  const onResize = () => {
    const c = mesh3d ? mesh3d.container : container;
    const nw = c.clientWidth, nh = c.clientHeight;
    if (nw === 0 || nh === 0) return;
    camera.aspect = nw / nh;
    camera.updateProjectionMatrix();
    renderer.setSize(nw, nh);
  };
  window.addEventListener('resize', onResize);

  mesh3d = { renderer, scene, camera, controls, animId, nodes, edges: edgeObjs, particles, labels: labelEls, container, onResize, glowRings };
  return true;
}

function updateMeshMap3D() {
  if (!mesh3d) return;
  const allBridges = [...bridgeData.values()].filter(b => !b._error);
  // If bridge count changed, full rebuild needed
  if (allBridges.length !== mesh3d.nodes.length) return;
  // Update node visuals
  for (let i = 0; i < mesh3d.nodes.length && i < allBridges.length; i++) {
    const node = mesh3d.nodes[i];
    const b = allBridges[i];
    const isOnline = !b._error;
    const peerCount = b.peers ? b.peers.connected : 0;
    if (isOnline && peerCount > 0) {
      node.mesh.material.color.setHex(0x3fb950);
      node.mesh.material.emissive.setHex(0x2a5a2a);
    } else if (isOnline) {
      node.mesh.material.color.setHex(0xd29922);
      node.mesh.material.emissive.setHex(0x4a3a10);
    } else {
      node.mesh.material.color.setHex(0xf85149);
      node.mesh.material.emissive.setHex(0x5a2020);
    }
    node.bridge = b;
    // Update label
    if (mesh3d.labels[i]) {
      mesh3d.labels[i].el.className = 'mesh3d-label ' + (isOnline ? 'online' : 'offline');
    }
  }
}

function destroyMeshMap3D() {
  if (!mesh3d) return;
  // Remove overlay if open
  const overlay = document.getElementById('mesh3dOverlay');
  if (overlay) overlay.remove();
  cancelAnimationFrame(mesh3d.animId);
  window.removeEventListener('resize', mesh3d.onResize);
  // Dispose geometries and materials
  mesh3d.scene.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
  mesh3d.renderer.dispose();
  // Remove canvas
  if (mesh3d.renderer.domElement && mesh3d.renderer.domElement.parentNode) {
    mesh3d.renderer.domElement.parentNode.removeChild(mesh3d.renderer.domElement);
  }
  // Remove labels
  for (const lb of mesh3d.labels) {
    if (lb.el && lb.el.parentNode) lb.el.parentNode.removeChild(lb.el);
  }
  mesh3d = null;
}

function expandMeshMap() {
  if (!mesh3d) return;
  // Create overlay
  const overlay = document.createElement('div');
  overlay.className = 'mesh3d-overlay';
  overlay.id = 'mesh3dOverlay';
  overlay.innerHTML = '<div class="mesh3d-expanded"><button class="mesh3d-close" onclick="collapseMeshMap()">&times;</button></div>';
  document.body.appendChild(overlay);
  // Click backdrop to close
  overlay.addEventListener('click', function(e) { if (e.target === overlay) collapseMeshMap(); });
  // Move canvas + labels into expanded container
  const expanded = overlay.querySelector('.mesh3d-expanded');
  expanded.appendChild(mesh3d.renderer.domElement);
  for (const lb of mesh3d.labels) {
    if (lb.el) expanded.appendChild(lb.el);
  }
  mesh3d.container = expanded;
  // Resize renderer to new container
  setTimeout(() => { mesh3d.onResize(); }, 50);
}

function collapseMeshMap() {
  const overlay = document.getElementById('mesh3dOverlay');
  if (!overlay) return;
  // Move canvas + labels back to inline container
  const inline = document.getElementById('mesh3dCanvas');
  if (mesh3d && inline) {
    inline.appendChild(mesh3d.renderer.domElement);
    for (const lb of mesh3d.labels) {
      if (lb.el) inline.appendChild(lb.el);
    }
    mesh3d.container = inline;
    setTimeout(() => { mesh3d.onResize(); }, 50);
  }
  overlay.remove();
}


// ── Mini peer map ──────────────────────────────────
function renderMiniMap(b) {
  if (!b.peers || !b.peers.list || b.peers.list.length === 0) return '';
  const W = 340, H = 180;
  const cx = W / 2, cy = H / 2;
  const peers = b.peers.list;
  const n = peers.length;
  const mainR = 22, peerR = 16;
  const orbit = Math.min(W, H) * 0.32;
  const positions = [];
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + (2 * Math.PI * i) / n;
    positions.push({ x: cx + orbit * Math.cos(angle), y: cy + orbit * Math.sin(angle) });
  }
  let svg = '<div class="mini-map"><svg viewBox="0 0 ' + W + ' ' + H + '">';
  for (let i = 0; i < n; i++) {
    const cls = peers[i].connected ? 'mm-line' : 'mm-line offline';
    svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + positions[i].x + '" y2="' + positions[i].y + '" class="' + cls + '" style="animation:dash 1.5s linear infinite"/>';
  }
  svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (mainR + 2) + '" class="mm-ring" stroke="' + 'var(--accent-blue)' + '" stroke-width="2"/>';
  svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + mainR + '" class="mm-bg"/>';
  svg += '<text x="' + cx + '" y="' + (cy + 4) + '" class="mm-label name" font-size="8">' + b._name + '</text>';
  for (let i = 0; i < n; i++) {
    const p = peers[i];
    const px = positions[i].x, py = positions[i].y;
    const ringColor = p.connected ? 'var(--accent-green)' : 'var(--accent-red)';
    svg += '<circle cx="' + px + '" cy="' + py + '" r="' + (peerR + 2) + '" class="mm-ring" stroke="' + ringColor + '"/>';
    svg += '<circle cx="' + px + '" cy="' + py + '" r="' + peerR + '" class="mm-bg"/>';
    svg += '<text x="' + px + '" y="' + (py + 3) + '" class="mm-label" font-size="8">' + truncPubkey(p.pubkeyHex).slice(0, 8) + '</text>';
  }
  svg += '</svg></div>';
  return svg;
}

function renderScoreBars(breakdown) {
  if (!breakdown) return '';
  const labels = [['UPT', breakdown.uptime], ['RTT', breakdown.responseTime], ['ACC', breakdown.dataAccuracy], ['BND', breakdown.stakeAge]];
  let html = '<div class="score-bars">';
  for (const [label, val] of labels) {
    const pct = Math.round(val * 100);
    const color = label === 'BND' ? (val >= 0.4 ? 'green' : val > 0 ? 'yellow' : 'yellow') : scoreColor(val);
    html += '<div class="score-row"><span class="score-label">' + label + '</span><div class="score-bar-bg"><div class="score-bar-fill ' + color + '" style="width:' + pct + '%"></div></div><span class="score-val">' + val.toFixed(2) + '</span></div>';
  }
  return html + '</div>';
}

// ── Job SSE streaming ──────────────────────────────
function streamJob(streamUrl) {
  if (jobSSE) jobSSE.close();
  jobSSE = new EventSource(streamUrl);
  jobSSE.onmessage = (e) => { try { const ev = JSON.parse(e.data); if (ev.type === 'end') { jobSSE.close(); jobSSE = null; if (ev.status === 'completed') appendJobLog('done', 'Completed successfully'); setTimeout(() => pollAll(), 1000); return; } appendJobLog(ev.type || 'step', ev.message); } catch {} };
  jobSSE.onerror = () => { appendJobLog('error', 'SSE connection lost'); jobSSE.close(); jobSSE = null; };
}
function appendJobLog(type, message) { const log = document.getElementById('jobLog'); if (!log) return; log.style.display = 'block'; const line = document.createElement('div'); line.className = type; line.textContent = message; log.appendChild(line); log.scrollTop = log.scrollHeight; }

async function fetchInscriptions() {
  const b = bridgeData.get(selectedBridge);
  if (!b) return;
  const mime = document.getElementById('mimeFilter')?.value || '';
  const address = document.getElementById('addressFilter')?.value.trim() || '';
  const el = document.getElementById('inscriptionResults');
  if (!el) return;

  el.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:30px">Loading...</div>';

  let url = b._url + '/inscriptions?limit=50';
  if (mime) url += '&mime=' + encodeURIComponent(mime);
  if (address) url += '&address=' + encodeURIComponent(address);

  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    const data = await r.json();
    if (data.error) { el.innerHTML = '<div style="color:var(--accent-red);padding:20px">' + escapeHtml(data.error) + '</div>'; return; }

    '<input type="text" id="scanAddressInput" placeholder="1Abc..." style="width:100%;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--mono);font-size:13px;margin-bottom:12px">' +
    '<button class="btn primary" onclick="startScanAddress(document.getElementById(\'scanAddressInput\').value.trim());closeModal()">Start Scan</button>'
  );

async function startScanAddress(address) {
  if (!address || address.length < 25 || address.length > 35) {
    const el = document.getElementById('scanProgress');
    if (el) { el.style.display = 'block'; el.innerHTML = '<div class="glass" style="padding:12px;color:var(--accent-red)">Invalid address</div>'; }
    return;
  }
  const b = bridgeData.get(selectedBridge);
  if (!b) return;

  const el = document.getElementById('scanProgress');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML = '<div class="glass" style="padding:12px"><div style="color:var(--text-secondary);font-size:13px">Starting scan for <span style="font-family:var(--mono);color:var(--accent-blue)">' + escapeHtml(address) + '</span>...</div><div id="scanProgressBar" style="margin-top:8px;height:4px;background:var(--bg-input);border-radius:2px;overflow:hidden"><div id="scanBar" style="width:0%;height:100%;background:var(--accent-blue);transition:width 0.3s"></div></div><div id="scanStatus" style="font-size:11px;color:var(--text-muted);margin-top:6px"></div></div>';

  try {
    const res = await fetch(b._url + '/scan-address', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          const bar = document.getElementById('scanBar');
          const status = document.getElementById('scanStatus');
          if (ev.phase === 'scanning' && ev.total > 0) {
            const pct = Math.round((ev.current / ev.total) * 100);
            if (bar) bar.style.width = pct + '%';
            if (status) {
              let msg = ev.current + '/' + ev.total;
              if (ev.found > 0) msg += ' — found ' + ev.found + ' inscription(s)';
              if (ev.error) msg += ' — error: ' + ev.error;
              status.textContent = msg;
            }
          } else if (ev.phase === 'discovery') {
            if (status) status.textContent = ev.message || 'Discovering...';
          } else if (ev.phase === 'done' || ev.phase === 'complete') {
            if (bar) bar.style.width = '100%';
            if (bar) bar.style.background = 'var(--accent-green)';
            if (status) status.textContent = ev.message || 'Scan complete';
            if (ev.result) {
              status.textContent = 'Done: ' + ev.result.txsScanned + ' txs scanned, ' + ev.result.inscriptionsFound + ' inscriptions found';
            }
            setTimeout(() => {
              const addrInput = document.getElementById('addressFilter');
              if (addrInput) addrInput.value = address;
              fetchInscriptions();
            }, 500);
          } else if (ev.phase === 'error') {
            if (bar) bar.style.background = 'var(--accent-red)';
            if (status) status.textContent = 'Error: ' + (ev.error || 'unknown');
          }
        } catch {}
      }
    }
  } catch (e) {
    el.innerHTML = '<div class="glass" style="padding:12px;color:var(--accent-red)">Scan failed: ' + escapeHtml(e.message) + '</div>';
  }
}

async function fetchTokens() {
  const b = bridgeData.get(selectedBridge);
  if (!b) return;
  const el = document.getElementById('tokenResults');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:30px">Loading...</div>';

  try {
    const r = await fetch(b._url + '/tokens', { signal: AbortSignal.timeout(10000) });
    const data = await r.json();
    if (data.error) { el.innerHTML = '<div style="color:var(--accent-red);padding:20px">' + escapeHtml(data.error) + '</div>'; return; }

    const tokens = data.tokens || [];
    const filter = (document.getElementById('tokenTickFilter')?.value || '').trim().toLowerCase();
    const filtered = filter ? tokens.filter(t => (t.tick || '').toLowerCase().includes(filter)) : tokens;

    if (filtered.length === 0) {
      el.innerHTML = '<div class="glass" style="padding:30px;text-align:center"><div style="color:var(--text-dim)">No BSV-20 tokens found</div></div>';
      return;
    }

    let html = '<div style="color:var(--text-muted);font-size:11px;margin-bottom:10px">' + filtered.length + ' token' + (filtered.length !== 1 ? 's' : '') + ' indexed</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">';
    for (const tok of filtered) {
      html += '<div class="glass" style="padding:14px;cursor:pointer" onclick="showTokenDetail(\'' + escapeHtml(tok.tick) + '\')">';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      html += protocolBadge('op_return', 'bsv-20');
      html += '<span style="font-size:14px;font-weight:600;color:var(--text-primary)">' + escapeHtml(tok.tick) + '</span>';
      html += '</div>';
      html += '<div style="font-size:11px;color:var(--text-muted)">';
      if (tok.max) html += 'Max: <span style="color:var(--text-secondary)">' + escapeHtml(String(tok.max)) + '</span> &middot; ';
      if (tok.lim) html += 'Limit: <span style="color:var(--text-secondary)">' + escapeHtml(String(tok.lim)) + '</span> &middot; ';
      html += 'Mints: <span style="color:var(--text-secondary)">' + (tok.mintCount || 0) + '</span>';

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div style="color:var(--accent-red);padding:20px">' + escapeHtml(e.message) + '</div>';
  }
}

function renderAppsTab() {
  let html = '<div style="margin-bottom:16px"><span style="font-size:15px;font-weight:600;color:var(--text-primary)">Apps</span>';
  html += '<span style="font-size:11px;color:var(--text-muted);margin-left:10px">Apps running on your bridge</span></div>';

    html += '<div class="glass" style="padding:30px;text-align:center"><div style="color:var(--text-dim)">No apps configured</div>';
    html += '<div style="color:var(--text-dim);font-size:11px;margin-top:4px">Add an "apps" array to your bridge config</div></div>';
    return html;
  }

  html += '<div class="apps-grid">';
  for (const app of appsData) {
    html += '<div class="app-card glass">';

    // Header: health dot + name + SSL badge
    const hStatus = app.health?.status || 'unknown';
    html += '<div class="app-card-header">';
    html += '<span class="app-health-dot ' + hStatus + '"></span>';
    html += '<span class="app-name"><a href="' + escapeHtml(app.url) + '" target="_blank">' + escapeHtml(app.name) + '</a></span>';
    if (app.ssl) {
      let sslClass = 'unknown', sslLabel = 'SSL ?';
      if (app.ssl.valid && app.ssl.daysRemaining > 30) { sslClass = 'valid'; sslLabel = 'SSL OK'; }
      else if (app.ssl.valid && app.ssl.daysRemaining <= 30) { sslClass = 'expiring'; sslLabel = app.ssl.daysRemaining + 'd left'; }
      else if (app.ssl.valid === false) { sslClass = 'expired'; sslLabel = 'SSL expired'; }
      html += '<span class="ssl-badge ' + sslClass + '">' + sslLabel + '</span>';
    }
    html += '</div>';

    // URLs
    html += '<div class="app-urls">' + escapeHtml(app.url);
    if (app.bridgeDomain) html += '<br>bridge: ' + escapeHtml(app.bridgeDomain);
    html += '</div>';

    // Status + response time
    if (app.health) {
      const h = app.health;
      const ms = h.responseTimeMs || 0;
      const msColor = ms < 500 ? 'green' : ms < 2000 ? 'yellow' : 'red';
      const msWidth = Math.max(8, Math.min(100, (ms / 3000) * 100));
      html += '<div class="app-stat-row">';
      html += '<span class="label">Status</span>';
      html += '<span class="value">' + (h.statusCode || '-') + '</span>';
      html += '<span class="label" style="margin-left:auto">Latency</span>';
      html += '<span class="value">' + ms + 'ms</span>';
      html += '</div>';
      html += '<div class="app-bar-bg"><div class="app-bar-fill ' + msColor + '" style="width:' + msWidth + '%"></div></div>';

      // Uptime
      const pct = h.uptimePercent != null ? h.uptimePercent : 0;
      const upColor = pct >= 99 ? 'green' : pct >= 90 ? 'yellow' : 'red';
      html += '<div class="app-stat-row">';
      html += '<span class="label">Uptime</span>';
      html += '<span class="value">' + pct.toFixed(1) + '%</span>';
      html += '<span style="font-size:10px;color:var(--text-dim);margin-left:auto">' + (h.checksUp || 0) + '/' + (h.checksTotal || 0) + ' checks</span>';
      html += '</div>';
      html += '<div class="app-bar-bg"><div class="app-bar-fill ' + upColor + '" style="width:' + pct + '%"></div></div>';
    }

    // SSL details
    if (app.ssl && app.ssl.valid != null) {
      html += '<div class="app-stat-row">';
      html += '<span class="label">SSL</span>';
      html += '<span class="value" style="font-size:11px">' + escapeHtml(app.ssl.issuer || '-') + '</span>';
      if (app.ssl.expiresAt) html += '<span style="font-size:10px;color:var(--text-dim);margin-left:auto">exp ' + new Date(app.ssl.expiresAt).toLocaleDateString() + '</span>';
      html += '</div>';
    }

    // Bridge usage
    if (app.usage) {
      html += '<div class="app-stat-row">';
      html += '<span class="label">Requests</span>';
      html += '<span class="value">' + (app.usage.totalRequests || 0).toLocaleString() + '</span>';
      if (app.usage.lastSeen) html += '<span style="font-size:10px;color:var(--text-dim);margin-left:auto">last ' + new Date(app.usage.lastSeen).toLocaleTimeString() + '</span>';
      html += '</div>';

      // Endpoint breakdown (top 8)
      const eps = app.usage.endpoints ? Object.entries(app.usage.endpoints).sort((a, b) => b[1] - a[1]).slice(0, 8) : [];
      if (eps.length > 0) {
        html += '<div class="ep-list">';
        for (const [path, count] of eps) {
          html += '<div class="ep-row"><span class="ep-path">' + escapeHtml(path) + '</span><span class="ep-count">' + count + '</span></div>';
        }
        html += '</div>';
      }
    }

    // Last error
    if (app.health?.lastError) {
      html += '<div class="app-error-box">' + escapeHtml(typeof app.health.lastError === 'object' ? app.health.lastError.message : app.health.lastError) + '</div>';
    }

    // Last check timestamp
    if (app.health?.lastCheck) {
      html += '<div style="font-size:10px;color:var(--text-dim);margin-top:4px">checked ' + new Date(app.health.lastCheck).toLocaleTimeString() + '</div>';
    }

    html += '</div>';
  }
  html += '</div>';
  return html;
}

      html += '<span style="color:var(--text-dim)">' + escapeHtml(rx.endpoint) + '</span>';
      html += '<span style="color:var(--accent-green)">' + Number(rx.satoshisPaid).toLocaleString() + ' sats</span>';
      html += '<span style="color:var(--text-dim)">' + age + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Settings panel (operator only)
  var b = bridgeData.get(selectedBridge);
  if (b && isOperator(b._url)) {
    html += '<div class="glass" style="padding:12px 16px;margin-bottom:8px">';
    html += '<div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Settings</div>';

    // Enable/disable checkbox
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html += '<input type="checkbox" id="x402Enabled"' + (x402Data.enabled ? ' checked' : '') + ' style="cursor:pointer">';
    html += '<label for="x402Enabled" class="label" style="cursor:pointer">Enable Payment Gate</label>';
    html += '</div>';

    // PayTo address
    html += '<div style="margin-bottom:8px">';
    html += '<div class="label" style="margin-bottom:4px">Pay To Address</div>';
    html += '<input type="text" id="x402PayTo" value="' + escapeHtml(x402Data.payTo || '') + '" placeholder="1YourBSVAddress..." style="width:100%;padding:6px 8px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:monospace;font-size:11px;box-sizing:border-box">';
    html += '</div>';

    // Endpoint pricing
    html += '<div class="label" style="margin-bottom:8px">Endpoint Pricing (satoshis)</div>';
    var epList = x402Data.endpoints || [];
    html += '<div id="x402Endpoints">';
    for (var k = 0; k < epList.length; k++) {
      html += '<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">';
      html += '<input type="text" value="' + escapeHtml(epList[k].method + ':' + epList[k].path) + '" class="x402-ep-key" style="flex:2;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:monospace;font-size:11px">';
      html += '<input type="number" value="' + epList[k].satoshis + '" class="x402-ep-val" style="flex:1;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:monospace;font-size:11px">';
      html += '<button onclick="removeX402Endpoint(this)" style="background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:14px">×</button>';
      html += '</div>';
    }
    html += '</div>';
    html += '<button class="btn" style="font-size:11px;padding:4px 12px;margin-bottom:12px" onclick="addX402Endpoint()">+ Add Endpoint</button>';

    // Save button
    html += '<div style="margin-top:8px;text-align:right">';
    html += '<button class="btn primary" style="font-size:12px;padding:6px 20px" onclick="saveX402Settings()">Save Settings</button>';
    html += '</div>';
    html += '</div>';
  }

  // Discovery endpoint hint
  html += '<div class="glass" style="padding:12px;font-size:11px;color:var(--text-dim)">';
  html += 'Discovery: <span style="font-family:monospace;color:var(--text-muted)">GET /.well-known/x402</span>';
  html += '</div>';

  return html;
}

async function fetchX402Data() {
  var b = bridgeData.get(selectedBridge);
  if (!b) return;
  try {
    var r = await fetch(b._url + '/x402' + getAuthParam(b._url), { signal: AbortSignal.timeout(10000) });
    if (!r.ok) { x402Data = { enabled: false, endpoints: [] }; if (activeTab === 'x402') { var el = document.getElementById('tabContent'); if (el) el.innerHTML = renderX402Tab(); } return; }
    x402Data = await r.json();
    if (activeTab === 'x402') {
      var el = document.getElementById('tabContent');
      if (el) el.innerHTML = renderX402Tab();
    }
  } catch (e) {
    x402Data = { enabled: false, endpoints: [] };
    if (activeTab === 'x402') {
      var el = document.getElementById('tabContent');
      if (el) el.innerHTML = '<div class="glass" style="padding:20px;color:var(--accent-red)">' + escapeHtml(e.message) + '</div>';
    }
  }
}


function addX402Endpoint() {
  var container = document.getElementById('x402Endpoints');
  if (!container) return;
  var div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px;align-items:center';
  div.innerHTML = '<input type="text" value="POST:/api/broadcast" class="x402-ep-key" style="flex:2;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:monospace;font-size:11px">' +
    '<input type="number" value="1000" class="x402-ep-val" style="flex:1;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-family:monospace;font-size:11px">' +
    '<button onclick="removeX402Endpoint(this)" style="background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:14px">\u00d7</button>';
  container.appendChild(div);
}

function removeX402Endpoint(btn) { btn.parentElement.remove(); }

async function saveX402Settings() {
  var b = bridgeData.get(selectedBridge);
  if (!b) return;
  var enabled = document.getElementById('x402Enabled')?.checked || false;
  var payTo = document.getElementById('x402PayTo').value.trim();
  var keys = document.querySelectorAll('.x402-ep-key');
  var vals = document.querySelectorAll('.x402-ep-val');
  var endpoints = {};
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i].value.trim();
    var v = parseInt(vals[i].value, 10);
    if (k && !isNaN(v)) endpoints[k] = v;
  }
  try {
    var r = await fetch(b._url + '/x402' + getAuthParam(b._url), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: enabled, payTo: payTo, endpoints: endpoints })
    });
    if (r.ok) { fetchX402Data(); }
    else { var err = await r.json().catch(function() { return {}; }); alert(err.error || 'Save failed'); }
  } catch (e) { alert(e.message); }
}

// ── Crawler/DNS tab ──────────────────────────────────
function renderCrawlerTab() {
  let html = '<div style="margin-bottom:16px"><span style="font-size:15px;font-weight:600;color:var(--text-primary)">Crawler / DNS Seed</span>';
  html += '<span style="font-size:11px;color:var(--text-muted);margin-left:10px">Network discovery and peer health</span></div>';

  if (!crawlerData) {
    html += '<div class="glass" style="padding:20px;color:var(--text-muted)">Loading...</div>';
    return html;
  }

  if (!crawlerData.available) {
    html += '<div class="glass" style="padding:30px;text-align:center"><div style="color:var(--text-dim)">Crawler not running on this bridge</div>';
    html += '<div style="color:var(--text-dim);font-size:11px;margin-top:4px">Switch to the bridge hosting the DNS seed to view crawler data</div></div>';
    return html;
  }

  // Summary card
  const lastCrawl = crawlerData.lastCrawlAt ? new Date(crawlerData.lastCrawlAt).toLocaleTimeString() : '-';
  html += '<div class="glass" style="padding:12px 16px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:20px">';
  html += '<div><div style="font-size:10px;color:var(--text-dim)">Total Tracked</div><div style="font-size:20px;font-weight:700;color:var(--text-primary)">' + (crawlerData.totalKnown || 0).toLocaleString() + '</div></div>';
  html += '<div><div style="font-size:10px;color:var(--text-dim)">Verified Alive</div><div style="font-size:20px;font-weight:700;color:var(--accent-green)">' + (crawlerData.verified || 0) + '</div></div>';
  html += '<div><div style="font-size:10px;color:var(--text-dim)">DNS Domain</div><div style="font-size:13px;color:var(--accent-blue);font-family:monospace">' + escapeHtml(crawlerData.domain || '-') + '</div></div>';
  html += '<div><div style="font-size:10px;color:var(--text-dim)">Last Crawl</div><div style="font-size:13px;color:var(--text-primary)">' + lastCrawl + '</div></div>';
  html += '</div>';

  // Bucket breakdown
  const buckets = crawlerData.buckets || {};
  const bucketOrder = ['success', 'no_version', 'refused', 'no_verack', 'not_bsv', 'dropped', 'error'];
  const bucketLabels = { success: 'Alive', no_version: 'No Version Reply', refused: 'Connection Refused', no_verack: 'No Verack', not_bsv: 'Not BSV', dropped: 'Dropped', error: 'Error' };
  const bucketColors = { success: 'var(--accent-green)', no_version: 'var(--text-dim)', refused: 'var(--accent-red)', no_verack: '#f5a623', not_bsv: '#e74c3c', dropped: '#8e8e93', error: '#ff3b30' };
  const total = Object.values(buckets).reduce((s, v) => s + v, 0) || 1;

  html += '<div class="glass" style="padding:12px 16px;margin-bottom:8px">';
  html += '<div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Failure Buckets</div>';
  for (const key of bucketOrder) {
    const count = buckets[key] || 0;
    if (count === 0) continue;
    const pct = ((count / total) * 100).toFixed(1);
    const barWidth = Math.max(2, (count / total) * 100);
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
    html += '<span style="font-size:11px;color:var(--text-muted);width:120px;flex-shrink:0">' + (bucketLabels[key] || key) + '</span>';
    html += '<div class="app-bar-bg" style="flex:1"><div class="app-bar-fill" style="width:' + barWidth + '%;background:' + (bucketColors[key] || 'var(--text-dim)') + '"></div></div>';
    html += '<span style="font-size:11px;color:var(--text-primary);width:60px;text-align:right">' + count.toLocaleString() + ' (' + pct + '%)</span>';
    html += '</div>';
  }
  html += '</div>';

  // Verified peers list
  if (crawlerData.peers && crawlerData.peers.length > 0) {
    html += '<div class="glass" style="padding:12px 16px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:8px">Verified Peers (' + crawlerData.peers.length + ')</div>';
    for (const p of crawlerData.peers) {
      const ago = p.lastSeen ? Math.round((Date.now() - p.lastSeen) / 60000) : '?';
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:11px">';
      html += '<span style="color:var(--accent-green)">\u25cf</span>';
      html += '<span style="color:var(--text-primary);font-family:monospace;flex:1">' + escapeHtml(p.host) + '</span>';
      html += '<span style="color:var(--text-muted)">' + escapeHtml(p.userAgent || '-') + '</span>';
      html += '<span style="color:var(--text-dim);width:60px;text-align:right">' + (p.height || '-') + '</span>';
      html += '<span style="color:var(--text-dim);width:50px;text-align:right">' + ago + 'm ago</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  return html;
}

async function fetchCrawlerData() {
  const b = bridgeData.get(selectedBridge);
  if (!b) return;
  try {
    const [healthR, peersR] = await Promise.all([
      fetch(b._url + '/api/crawler/health', { signal: AbortSignal.timeout(5000) }),
      fetch(b._url + '/api/crawler/peers', { signal: AbortSignal.timeout(5000) })
    ]);
    const health = await healthR.json();
    const peersData = await peersR.json();
    if (health.available) {
      crawlerData = { ...health, peers: peersData.peers || [] };
    } else {
      crawlerData = { available: false };
    }
  } catch (e) {
    crawlerData = { available: false, error: e.message };
  }
  if (activeTab === 'crawler') {
    const el = document.getElementById('tabContent');
    if (el) el.innerHTML = renderCrawlerTab();
  }
}

// ── Forest tab ──────────────────────────────────────
function renderForestTab() {
  if (!forestData) return '<div class="glass" style="padding:20px;color:var(--text-muted)">Loading forest data...</div>';

  const d = forestData;
  const ghostTotal = d.ghostCount || 0;
  // Limit rendered ghosts to 200 DOM nodes (sampled from ~1400)
  const ghostRender = Math.min(ghostTotal, 200);

  let html = '<div class="forest-scene" style="position:relative;width:100%;height:700px;overflow:hidden;border-radius:12px;background:#0a0e0a">';

  // Background: forest floor
  html += '<div style="position:absolute;inset:0;background:url(/art/efqco.jpg) center/cover;opacity:0.35"></div>';

  // Soil line at 70% height
  html += '<div style="position:absolute;left:0;right:0;top:70%;height:30%;background:linear-gradient(to bottom,transparent,rgba(20,15,10,0.95))"></div>';

  // Underground mycelium threads (SVG)
  html += '<svg class="forest-mycelium" style="position:absolute;left:0;top:70%;width:100%;height:30%;opacity:0.4" xmlns="http://www.w3.org/2000/svg">';
  // Generate threads connecting bridges
  const bCount = d.bridges ? d.bridges.length : 0;
  for (let i = 0; i < bCount; i++) {
    for (let j = i + 1; j < bCount; j++) {
      const x1 = (i + 0.5) / bCount * 100;
      const x2 = (j + 0.5) / bCount * 100;
      const cy = 20 + Math.random() * 40;
      html += '<path d="M' + x1 + '%,5% Q' + ((x1 + x2) / 2) + '%,' + cy + '% ' + x2 + '%,5%" fill="none" stroke="rgba(0,255,180,0.3)" stroke-width="1.5"><animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="' + (3 + Math.random() * 4) + 's" repeatCount="indefinite"/></path>';
    }
  }
  html += '</svg>';

  // Ghost mushrooms — deep background, visible but faded
  html += '<div class="forest-layer" style="position:absolute;left:0;right:0;top:10%;height:60%;pointer-events:none">';
  for (let i = 0; i < ghostRender; i++) {
    const x = (Math.random() * 96 + 2);
    const y = (Math.random() * 80 + 10);
    const s = 20 + Math.random() * 20;
    const op = 0.08 + Math.random() * 0.07;
    html += '<img src="/art/ghost-mushroom.png" style="position:absolute;left:' + x + '%;top:' + y + '%;width:' + s + 'px;height:auto;opacity:' + op.toFixed(2) + ';transform:translate(-50%,-100%)" alt="">';
  }
  html += '</div>';

  // Peer mushrooms — mid layer, scattered
  if (d.peers && d.peers.length > 0) {
    html += '<div class="forest-layer" style="position:absolute;left:0;right:0;top:30%;height:40%">';
    for (let i = 0; i < d.peers.length; i++) {
      const x = 5 + (i / d.peers.length) * 90 + (Math.random() * 6 - 3);
      const y = 40 + Math.random() * 50;
      html += '<div class="forest-entity" style="position:absolute;left:' + x + '%;top:' + y + '%;transform:translate(-50%,-100%);cursor:pointer" title="' + escapeHtml(d.peers[i].host + ' | ' + (d.peers[i].userAgent || '?') + ' | height ' + (d.peers[i].height || '?')) + '">';
      html += '<img src="/art/peer-mushroom.png" style="width:24px;height:auto;filter:drop-shadow(0 0 4px rgba(100,180,255,0.4))">';
      html += '</div>';
    }
    html += '</div>';
  }

  // App mushrooms — mid-ground, between bridges
  if (d.apps && d.apps.length > 0) {
    html += '<div class="forest-layer" style="position:absolute;left:0;right:0;top:35%;height:35%">';
    for (let i = 0; i < d.apps.length; i++) {
      const x = 10 + (i / d.apps.length) * 80;
      const y = 50 + (i % 2) * 15;
      const hStatus = d.apps[i].health?.status || 'unknown';
      const glow = hStatus === 'up' ? 'drop-shadow(0 0 8px rgba(255,180,60,0.6))' : 'drop-shadow(0 0 4px rgba(255,180,60,0.2))';
      html += '<div class="forest-entity" style="position:absolute;left:' + x + '%;top:' + y + '%;transform:translate(-50%,-100%);cursor:pointer;text-align:center" title="' + escapeHtml(d.apps[i].name + ' — ' + (hStatus === 'up' ? 'Healthy' : 'Down') + ' — ' + d.apps[i].url) + '">';
      html += '<img src="/art/app-mushroom.png" style="width:40px;height:auto;filter:' + glow + '">';
      html += '<div style="font-size:9px;color:rgba(255,200,100,0.8);margin-top:2px;white-space:nowrap">' + escapeHtml(d.apps[i].name) + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Bridge mushrooms — foreground, large
  if (d.bridges && d.bridges.length > 0) {
    html += '<div class="forest-layer" style="position:absolute;left:0;right:0;top:30%;height:40%">';
    for (let i = 0; i < d.bridges.length; i++) {
      const b = d.bridges[i];
      const x = 8 + (i / d.bridges.length) * 84;
      const alive = b.peers > 0;
      const glow = alive ? 'drop-shadow(0 0 12px rgba(0,255,180,0.5))' : 'drop-shadow(0 0 6px rgba(100,100,100,0.3))';
      html += '<div class="forest-entity" style="position:absolute;left:' + x + '%;top:75%;transform:translate(-50%,-100%);cursor:pointer;text-align:center" title="' + escapeHtml(b.name + ' — ' + b.peers + ' BSV peers — height ' + b.height) + '">';
      html += '<img src="/art/bridge-mushroom-v2.png" style="width:70px;height:auto;filter:' + glow + '">';
      html += '<div style="font-size:10px;color:rgba(0,255,180,0.9);margin-top:2px;font-weight:600">' + escapeHtml(b.name) + '</div>';
      html += '<div style="font-size:9px;color:var(--text-dim)">' + b.peers + ' peers | ' + b.height + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Spore particles — float upward
  html += '<div class="forest-layer" style="position:absolute;inset:0;pointer-events:none;overflow:hidden">';
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * 100;
    const delay = Math.random() * 8;
    const dur = 6 + Math.random() * 6;
    const size = 10 + Math.random() * 10;
    html += '<img src="/art/spore-particle.png" class="forest-spore" style="position:absolute;left:' + x + '%;bottom:-10px;width:' + size + 'px;height:auto;opacity:0.7;filter:drop-shadow(0 0 4px rgba(0,255,180,0.4));animation:sporeFloat ' + dur + 's ' + delay + 's linear infinite">';

  html += '</div>'; // .forest-scene

  html += '<div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;padding:8px 12px" class="glass">';
  html += '<div style="display:flex;align-items:center;gap:4px;font-size:11px"><img src="/art/bridge-mushroom-v2.png" style="width:20px;height:auto"> <span style="color:var(--text-primary)">Bridges (' + (d.bridges?.length || 0) + ')</span></div>';
  html += '<div style="display:flex;align-items:center;gap:4px;font-size:11px"><img src="/art/app-mushroom.png" style="width:16px;height:auto"> <span style="color:var(--text-primary)">Apps (' + (d.apps?.length || 0) + ')</span></div>';
  html += '<div style="display:flex;align-items:center;gap:4px;font-size:11px"><img src="/art/peer-mushroom.png" style="width:14px;height:auto"> <span style="color:var(--text-primary)">Wild Peers (' + (d.peers?.length || 0) + ')</span></div>';
  html += '<div style="display:flex;align-items:center;gap:4px;font-size:11px"><img src="/art/ghost-mushroom.png" style="width:12px;height:auto;opacity:0.4"> <span style="color:var(--text-dim)">Ghosts (' + ghostTotal.toLocaleString() + ')</span></div>';
  html += '<div style="display:flex;align-items:center;gap:4px;font-size:11px"><img src="/art/spore-particle.png" style="width:8px;height:auto"> <span style="color:var(--text-dim)">Spores — data flowing through the network</span></div>';
  html += '</div>';

  // Stats panels below forest — 3 columns

  const buckets = d.buckets || {};

  const crawlerTotal = d.crawlerTotal || 0;

  // Column 1: Federation Health
  html += '<div class="glass" style="padding:14px;font-size:11px">';
  html += '<div style="font-size:13px;font-weight:700;color:rgba(0,255,180,0.9);margin-bottom:10px">Federation Health</div>';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">Bridges</span><span style="color:var(--text-primary)">' + (d.bridges?.length || 0) + ' online</span></div>';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">Total BSV Peers</span><span style="color:var(--accent-green)">' + totalPeers + '</span></div>';

  html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">Nodes Discovered</span><span style="color:var(--text-primary)">' + crawlerTotal.toLocaleString() + '</span></div>';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">Alive</span><span style="color:var(--accent-green)">' + crawlerAlive + '</span></div>';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:var(--text-muted)">Ghosts</span><span style="color:var(--text-dim)">' + ghostTotal.toLocaleString() + '</span></div>';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text-muted)">DNS Seed</span><span style="color:var(--accent-green)">seed.indelible.one</span></div>';
  if (Object.keys(buckets).length > 0) {
    html += '<div style="height:1px;background:rgba(255,255,255,0.06);margin:6px 0 8px"></div>';
    html += '<div style="font-size:10px;color:var(--text-muted);margin-bottom:6px">Failure Buckets</div>';
    const bColors = { success:'#00ffb4', refused:'#ff6b6b', no_version:'#666', no_verack:'#888', unreachable:'#555', not_bsv:'#ff4444', dropped:'#997', error:'#f44' };
    const bTotal = Object.values(buckets).reduce((s, v) => s + v, 0) || 1;
    for (const [k, v] of Object.entries(buckets)) {
      const pct = (v / bTotal * 100).toFixed(1);
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:55%;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden"><div style="width:' + pct + '%;height:100%;background:' + (bColors[k] || '#888') + ';border-radius:3px"></div></div><span style="color:' + (bColors[k] || '#888') + ';font-size:9px;min-width:60px">' + k.replace(/_/g, ' ') + '</span><span style="color:var(--text-dim);font-size:9px">' + v + '</span></div>';
    }
  }
  html += '</div>';

  // Column 3: Apps
  html += '<div class="glass" style="padding:14px;font-size:11px">';
  html += '<div style="font-size:13px;font-weight:700;color:rgba(255,180,60,0.9);margin-bottom:10px">Apps</div>';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text-muted)">Deployed</span><span style="color:var(--text-primary)">' + (d.apps?.length || 0) + '</span></div>';
  if (d.apps && d.apps.length > 0) {
    for (const app of d.apps) {
      const up = app.health?.status === 'up';
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:6px"><div style="width:6px;height:6px;border-radius:50%;background:' + (up ? '#00ffb4' : '#ff4444') + '"></div><div style="flex:1"><div style="color:var(--text-secondary);font-size:11px">' + escapeHtml(app.name) + '</div><div style="color:var(--text-dim);font-size:9px">' + escapeHtml(app.url || '') + '</div></div><span style="font-size:9px;color:' + (up ? '#00ffb4' : '#ff4444') + '">' + (up ? 'UP' : 'DOWN') + '</span></div>';
    }
  } else {
    html += '<div style="color:var(--text-dim);font-size:10px">No apps configured on this bridge</div>';
  }
  html += '<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)"><span style="color:var(--text-muted)">Wild Peers</span><span style="color:var(--text-primary)">' + (d.peers?.length || 0) + '</span></div>';
  html += '</div>';

  html += '</div>'; // grid

  return html;
}

async function fetchForestData() {
  const bridges = [];
  for (const [id, b] of bridgeData) {
    bridges.push({
      name: b.name || id,
      peers: b.peers?.connected || 0,
      height: b.headers?.bestHeight || 0,
      url: b._url
    });
  }

  let apps = [];
  let peers = [];
  let ghostCount = 0;
  let crawlerBuckets = {};
  let crawlerAlive = 0;
  let crawlerTotal = 0;

  // Fetch apps from selected bridge
  const sb = bridgeData.get(selectedBridge);
  if (sb) {
    try {
      const r = await fetch(sb._url + '/apps', { signal: AbortSignal.timeout(5000) });
      if (r.ok) { const d = await r.json(); apps = Array.isArray(d) ? d : (d.apps || []); }
    } catch {}
  }

  // Fetch crawler data (peers + ghosts) — try all bridges, take first available
  for (const [, b] of bridgeData) {
    try {
      const [hR, pR] = await Promise.all([
        fetch(b._url + '/api/crawler/health', { signal: AbortSignal.timeout(3000) }),
        fetch(b._url + '/api/crawler/peers', { signal: AbortSignal.timeout(3000) })
      ]);
      const health = await hR.json();
      if (health.available) {
        const pData = await pR.json();
        peers = pData.peers || [];
        crawlerBuckets = health.buckets || {};
        crawlerAlive = health.verified || 0;
        crawlerTotal = health.totalKnown || 0;
        ghostCount = Object.entries(crawlerBuckets).filter(([k]) => k !== 'success').reduce((s, [, v]) => s + v, 0);
        break; // Found crawler, stop searching
      }
    } catch {}
  }

  forestData = { bridges, apps, peers, ghostCount, buckets: crawlerBuckets, crawlerAlive, crawlerTotal };
  if (activeTab === 'forest') {
    const el = document.getElementById('tabContent');
    if (el) el.innerHTML = renderForestTab();
  }
}

// ── Log viewer ─────────────────────────────────────
function openLogViewer(bridgeUrl) {
  document.getElementById('logViewerBody').innerHTML = '';
  document.getElementById('logViewer').classList.add('active');
  if (logSSE) logSSE.close();
  logSSE = new EventSource(bridgeUrl + '/logs');
  logSSE.onmessage = (e) => { try { const entry = JSON.parse(e.data); const body = document.getElementById('logViewerBody'); const line = document.createElement('div'); line.className = 'log-line'; line.innerHTML = '<span class="log-ts">' + new Date(entry.timestamp).toLocaleTimeString() + '</span>' + escapeHtml(entry.message); body.appendChild(line); while (body.children.length > 200) body.removeChild(body.firstChild); body.scrollTop = body.scrollHeight; } catch {} };
  logSSE.onerror = () => { const body = document.getElementById('logViewerBody'); const line = document.createElement('div'); line.className = 'log-line'; line.style.color = 'var(--accent-red)'; line.textContent = 'SSE connection lost'; body.appendChild(line); };
}
function closeLogViewer() { document.getElementById('logViewer').classList.remove('active'); if (logSSE) { logSSE.close(); logSSE = null; } }

// ── Init ───────────────────────────────────────────
pollAll();
setInterval(pollAll, POLL_INTERVAL);
setInterval(discoverBridges, 60000);
</script>
